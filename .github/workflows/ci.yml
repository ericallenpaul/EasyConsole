name: CI

# Builds and validates packaging on every push to master and on pull requests,
# so problems surface before you cut a release.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore EasyConsole.slnx

      - name: Build
        run: dotnet build EasyConsole.slnx --configuration Release --no-restore

      - name: Pack (validate the package builds)
        run: dotnet pack EasyConsole/EasyConsole.csproj --configuration Release --no-build --output ${{ github.workspace }}/artifacts
